<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Board games</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; background: #12161b; color: #e8e8e8; }
      #app { display: flex; height: 100vh; height: 100dvh; }
      #view { flex: 1; position: relative; min-width: 0; display: grid; place-items: center; padding: 16px; }
      #board { display: block; touch-action: none; border-radius: 6px; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
      #panel { width: 288px; padding: 16px; background: #1b2229; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
      a.back { font-size: 12px; color: #7fb0d8; text-decoration: none; }
      a.back:hover { text-decoration: underline; }
      h1 { font-size: 16px; margin: 2px 0 0; color: #cfe0ee; letter-spacing: 0.5px; }
      .hint { font-size: 11px; color: #6f8496; line-height: 1.4; }
      .ctl { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
      .ctl > label { color: #a8b6c4; }
      select, input { min-height: 34px; font-size: 14px; padding: 0 8px; border-radius: 8px; background: #222b34; color: #e8e8e8; border: 1px solid #3a4753; }
      #net-code { flex: 1; min-width: 0; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; text-align: center; }
      #lobby .row { display: flex; gap: 6px; }
      #net-status { min-height: 16px; }
      #net-status b { color: #ffdf6b; letter-spacing: 3px; font-size: 15px; }
      #leaderboard { margin-top: 10px; }
      .lb-head { display: flex; align-items: center; justify-content: space-between;
        font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: #7f93a5; }
      .lb-head button { padding: 2px 7px; font-size: 12px; background: #33404c; line-height: 1; }
      .lb-list { list-style: none; margin: 6px 0 0; padding: 0; font-size: 12.5px; }
      .lb-list li { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; border-bottom: 1px solid #232c35; color: #cbd6e0; }
      .lb-list li:last-child { border-bottom: none; }
      .lb-list li .rank { color: #7f93a5; width: 16px; text-align: right; }
      .lb-list li .nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .lb-list li .wl { color: #8fa3b5; font-variant-numeric: tabular-nums; }
      .lb-list li.me .nm { color: #ffdf6b; font-weight: 700; }
      .lb-empty { color: #6f8496; font-size: 11px; padding: 4px 0; }
      #invite-row { margin-top: 8px; }
      #invite-name { flex: 1; min-width: 0; text-align: left; letter-spacing: 0; text-transform: none; font-weight: 400; }
      #invite-status { min-height: 14px; margin-top: 4px; }
      /* incoming-invite toast — bottom-right card */
      #invite-toast { position: fixed; right: 16px; bottom: 16px; z-index: 60; display: none; width: 260px;
        background: #1b2229; border: 1px solid #2e7d5b; border-radius: 10px; padding: 12px 14px;
        box-shadow: 0 12px 40px rgba(0,0,0,.55); }
      #invite-toast.show { display: block; animation: toastin .18s ease-out; }
      @keyframes toastin { from { transform: translateY(8px); opacity: 0; } }
      #invite-toast .it-msg { font-size: 13px; color: #e8e8e8; line-height: 1.4; }
      #invite-toast .it-msg b { color: #ffdf6b; }
      #invite-toast .it-actions { display: flex; gap: 8px; margin-top: 10px; }
      #invite-toast .it-actions button { flex: 1; padding: 7px 10px; font-size: 13px; }
      button { padding: 9px 12px; font-size: 14px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; background: #2e7d5b; color: #fff; }
      button:disabled { opacity: 0.5; cursor: default; }
      button.sec { background: #33404c; }
      #gamecontrols { display: flex; flex-direction: column; gap: 8px; }
      #gamecontrols:empty { display: none; }
      #turn { display: none; padding: 9px 12px; border-radius: 8px; background: linear-gradient(90deg,#1f7a4d,#26935d);
        color: #eafff3; font-weight: 800; font-size: 13.5px; letter-spacing: .3px; }
      #turn.show { display: block; }
      #result { display: none; padding: 10px 12px; border-radius: 8px; text-align: center; font-weight: 900; letter-spacing: 1px;
        font-size: 16px; background: rgba(255,210,80,0.12); color: #ffdf6b; border: 1px solid rgba(255,210,80,.5); }
      #result.show { display: block; }
      #status { font-size: 12px; color: #8fa3b5; min-height: 30px; line-height: 1.4; }
      details#rules { border: 1px solid #33404c; border-radius: 8px; background: #151b21; }
      details#rules > summary { list-style: none; cursor: pointer; padding: 9px 12px; font-size: 13px; font-weight: 600; color: #cfe0ee; }
      details#rules > summary::-webkit-details-marker { display: none; }
      details#rules > summary::before { content: '▸ '; color: #7f93a5; }
      details#rules[open] > summary::before { content: '▾ '; }
      details#rules .rbody { padding: 0 12px 12px; font-size: 12px; color: #a8b6c4; line-height: 1.5; }
      details#rules .rbody h4 { margin: 10px 0 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: #7f93a5; }
      details#rules .rbody ul { margin: 0; padding-left: 16px; }
      #err { max-width: 420px; text-align: center; line-height: 1.5; }
      #err a { color: #54c98a; }
      #version { position: fixed; top: 10px; left: 12px; z-index: 50; pointer-events: none; user-select: none;
        font: 600 12px/1 system-ui, sans-serif; letter-spacing: .5px; color: #6f8496; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
      /* relay reachability — small, bottom-left; only shown in online mode */
      #netstat { position: fixed; bottom: 10px; left: 12px; z-index: 50; display: none; align-items: center; gap: 6px;
        pointer-events: none; user-select: none; font: 600 11px/1 system-ui, sans-serif; letter-spacing: .3px; color: #8fa3b5;
        text-shadow: 0 1px 3px rgba(0,0,0,.6); }
      #netstat.show { display: flex; }
      #netstat .dot { width: 8px; height: 8px; border-radius: 50%; background: #6f8496; }
      #netstat.online .dot { background: #54c98a; }
      #netstat.connecting .dot { background: #ffcf5b; animation: netpulse 1s ease-in-out infinite; }
      #netstat.offline .dot { background: #e23b3b; }
      @keyframes netpulse { 50% { opacity: .3; } }

      @media (pointer: coarse) {
        button { padding: 13px 14px; font-size: 15px; border-radius: 10px; }
        select { min-height: 46px; font-size: 15px; }
      }
      @media (max-width: 760px) {
        #app { flex-direction: column; }
        #view { flex: none; height: 56dvh; width: 100%; padding: 10px; }
        #panel { width: 100%; flex: 1; min-height: 0; padding: 12px 14px 24px; }
      }
    </style>
  </head>
  <body>
    <div id="version"></div>
    <div id="netstat"><span class="dot"></span><span id="netstat-label">Server</span></div>
    <div id="app">
      <div id="view">
        <canvas id="board" width="480" height="480"></canvas>
        <div id="err" style="display:none;"></div>
      </div>
      <div id="panel">
        <a class="back" href="../index.html">← All games</a>
        <h1 id="gametitle">Board game</h1>
        <div class="ctl" id="authbar" style="display:none;">
          <div id="userchip" class="hint">Not signed in</div>
          <button id="login">Log in</button>
          <button id="logout" class="sec" style="display:none;">Log out</button>
        </div>
        <div id="result"></div>
        <div id="turn"></div>
        <div class="ctl"><label>Opponent</label>
          <select id="mode">
            <option value="ai" selected>You vs AI</option>
            <option value="human">Two players (hot-seat)</option>
            <option value="online">Play online</option>
          </select>
        </div>
        <div class="ctl" id="row-difficulty"><label>AI difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div class="ctl" id="lobby" style="display:none;"><label>Online game</label>
          <button id="net-create">Create room</button>
          <div class="row">
            <input id="net-code" placeholder="CODE" maxlength="4" autocomplete="off" spellcheck="false" />
            <button id="net-join" class="sec">Join</button>
          </div>
          <div id="net-status" class="hint"></div>
          <div id="invite-row" style="display:none;">
            <div class="row">
              <input id="invite-name" placeholder="Friend's name" autocomplete="off" spellcheck="false" />
              <button id="invite-send" class="sec">Invite</button>
            </div>
            <div id="invite-status" class="hint"></div>
          </div>
          <div id="leaderboard">
            <div class="lb-head"><span>🏆 Top players</span><button id="lb-refresh" class="sec" title="Refresh">⟳</button></div>
            <ol id="lb-list" class="lb-list"></ol>
          </div>
        </div>
        <div id="gamecontrols"></div>
        <button id="rematch" style="display:none;">↻ Rematch</button>
        <button id="newgame">New game</button>
        <div id="status"></div>
        <details id="rules"><summary>How to play &amp; rules</summary><div class="rbody" id="rules-body"></div></details>
      </div>
    </div>
    <div id="invite-toast" role="alert">
      <div class="it-msg" id="it-msg"></div>
      <div class="it-actions"><button id="it-join">Join</button><button id="it-dismiss" class="sec">Dismiss</button></div>
    </div>
    <!-- three.js is vendored locally (web/vendor/three, r160); the Dice view renders in 3D. -->
    <script type="importmap">
      { "imports": { "three": "./vendor/three/three.module.js", "three/addons/": "./vendor/three/addons/" } }
    </script>
    <!-- per-deployment config (relay/login endpoints); must run before the modules. -->
    <script src="./config.local.js"></script>
    <script type="module" src="./board.js"></script>
  </body>
</html>
